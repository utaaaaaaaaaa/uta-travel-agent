syntax = "proto3";

package agent.common;

option go_package = "github.com/utaaa/uta-travel-agent/proto/common";

// Common message types used across services

message Empty {}

message Error {
    string code = 1;
    string message = 2;
}

message Location {
    double latitude = 1;
    double longitude = 2;
    double accuracy = 3;
}

message AgentMetadata {
    string id = 1;
    string user_id = 2;
    string name = 3;
    string description = 4;
    string destination = 5;
    string theme = 6;
    repeated string languages = 7;
    repeated string tags = 8;
    string status = 9;
    int64 created_at = 10;
    int64 updated_at = 11;
    int32 document_count = 12;
}