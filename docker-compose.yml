version: '3.8'

services:
  # ===================
  # Infrastructure
  # ===================

  # PostgreSQL - Agent persistence
  postgres:
    image: postgres:15-alpine
    container_name: uta-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uta_travel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./internal/storage/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: uta-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache
  redis:
    image: redis:7-alpine
    container_name: uta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Neo4j - Knowledge Graph Database
  neo4j:
    image: neo4j:5.15
    container_name: uta-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/uta-password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # Application Services
  # ===================

  # Python Embedding Service
  embedding:
    build:
      context: .
      dockerfile: services/embedding/Dockerfile
    container_name: uta-embedding
    ports:
      - "50052:50052"
    environment:
      - GRPC_PORT=50052
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
    volumes:
      - embedding_models:/app/models
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      - postgres

  # Go Orchestrator
  orchestrator:
    build:
      context: .
      dockerfile: cmd/orchestrator/Dockerfile
    container_name: uta-orchestrator
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - EMBEDDING_ADDR=embedding:50052
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=uta_travel
      - DATABASE_SSLMODE=disable
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=uta-password
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      - LLM_MODEL=${LLM_MODEL:-glm-4-flash}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      embedding:
        condition: service_started

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: uta-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - orchestrator

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  embedding_models:
  huggingface_cache:

networks:
  default:
    name: uta-network
