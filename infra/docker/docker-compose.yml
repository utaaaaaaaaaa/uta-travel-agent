version: '3.8'

services:
  # PostgreSQL - Primary database for agent metadata
  postgres:
    image: postgres:16-alpine
    container_name: uta-postgres
    environment:
      POSTGRES_USER: uta
      POSTGRES_PASSWORD: uta_dev_password
      POSTGRES_DB: uta_travel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uta"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - Cache and session storage
  redis:
    image: redis:7-alpine
    container_name: uta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant - Vector database for RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: uta-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - Object storage for files and images
  minio:
    image: minio/minio:latest
    container_name: uta-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Orchestrator - Go service (development)
  orchestrator:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.orchestrator
    container_name: uta-orchestrator
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - PORT=8080
      - GRPC_PORT=50051
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=uta
      - POSTGRES_PASSWORD=uta_dev_password
      - POSTGRES_DB=uta_travel
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # Destination Agent - Python service (development)
  destination-agent:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.destination-agent
    container_name: uta-destination-agent
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GRPC_HOST=orchestrator
      - GRPC_PORT=50051
    depends_on:
      - orchestrator
      - qdrant

  # Guide Agent - Python service (development)
  guide-agent:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.guide-agent
    container_name: uta-guide-agent
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GRPC_HOST=orchestrator
      - GRPC_PORT=50051
    depends_on:
      - orchestrator
      - qdrant

  # Planner Agent - Python service (development)
  planner-agent:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.planner-agent
    container_name: uta-planner-agent
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GRPC_HOST=orchestrator
      - GRPC_PORT=50051
    depends_on:
      - orchestrator
      - qdrant

  # Frontend - Next.js (development)
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: uta-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    depends_on:
      - orchestrator

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data: