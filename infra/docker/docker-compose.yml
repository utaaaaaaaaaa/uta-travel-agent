version: '3.8'

services:
  # ===================
  # Storage Services
  # ===================
  postgres:
    image: postgres:16-alpine
    container_name: uta-postgres
    environment:
      POSTGRES_USER: uta
      POSTGRES_PASSWORD: uta_dev_password
      POSTGRES_DB: uta_travel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uta"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uta-network

  redis:
    image: redis:7-alpine
    container_name: uta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uta-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: uta-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uta-network

  minio:
    image: minio/minio:latest
    container_name: uta-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uta-network

  # ===================
  # API Gateway (Go)
  # ===================
  api-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/api-gateway.Dockerfile
    container_name: uta-api-gateway
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER=grpc
      - LLM_GRPC_ADDR=llm-gateway:50051
      - EMBEDDING_GRPC_ADDR=embedding:50052
      - VISION_GRPC_ADDR=vision:50053
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=uta
      - POSTGRES_PASSWORD=uta_dev_password
      - POSTGRES_DB=uta_travel
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
    networks:
      - uta-network
    volumes:
      - agent-data:/app/data

  # ===================
  # Python gRPC Services
  # ===================
  llm-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/llm-gateway.Dockerfile
    container_name: uta-llm-gateway
    ports:
      - "50051:50051"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GRPC_PORT=50051
    networks:
      - uta-network
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 50051)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5

  embedding:
    build:
      context: ../..
      dockerfile: infra/docker/embedding.Dockerfile
    container_name: uta-embedding
    ports:
      - "50052:50052"
    environment:
      - GRPC_PORT=50052
    networks:
      - uta-network

  vision:
    build:
      context: ../..
      dockerfile: infra/docker/vision.Dockerfile
    container_name: uta-vision
    ports:
      - "50053:50053"
    environment:
      - GRPC_PORT=50053
    networks:
      - uta-network

  # ===================
  # Frontend (Next.js)
  # ===================
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    container_name: uta-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8080
      - NODE_ENV=production
    depends_on:
      - api-gateway
    networks:
      - uta-network

networks:
  uta-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  agent-data: