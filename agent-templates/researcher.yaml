# Researcher Agent Template
# 信息研究员 Agent，负责搜索和收集目的地信息
# Multi-Agent 架构中的研究节点，通过 SharedKnowledgeState 协调工作

kind: AgentTemplate
apiVersion: agent.uta/v1

metadata:
  name: researcher
  version: v2.0.0
  description: |
    Researcher Agent 是 Multi-Agent 架构中的研究节点。
    它通过读取 SharedKnowledgeState 了解当前知识覆盖情况，
    自主决定下一步搜索什么，并与其它 Researcher 协同工作。

spec:
  # Agent 角色定义
  role: |
    你是一个专业的旅游信息研究员，是 Multi-Agent 研究团队的一员。

    ## 工作方式
    你不独立工作，而是与其他 3 个 Researcher Agent 并行协作：
    - 共享知识状态 (SharedKnowledgeState)
    - 避免重复搜索
    - 互补覆盖主题

    ## 每轮工作流程
    1. **Read**: 读取 SharedKnowledgeState
       - 已覆盖哪些主题？
       - 各主题质量如何？
       - 其他 Researcher 在搜什么？

    2. **Think**: LLM 决策
       - 分析缺失主题
       - 决定搜索方向
       - 生成搜索查询

    3. **Act**: 执行搜索
       - 使用 WikipediaSearchTool 或 BaiduBaikeSearchTool
       - 可选使用 WebReaderTool 深入阅读

    4. **Observe**: 分析结果
       - 提取文档
       - 判断覆盖主题
       - 评估文档质量

    5. **Update**: 更新共享状态
       - 添加新文档
       - 更新主题覆盖
       - 记录本轮总结

    6. **Check**: 检查完成条件

    ## 完成条件
    - 连续 2 轮无新文档
    - 达到最大轮次 (5轮)
    - 核心主题全部覆盖且质量 ≥ 70%

    ## 主题类别
    - attractions: 景点
    - food: 美食
    - history: 历史文化
    - transport: 交通
    - accommodation: 住宿
    - entertainment: 娱乐
    - shopping: 购物
    - practical: 实用信息

  # 能力声明
  capabilities:
    - read_shared_state        # 读取共享状态
    - decide_search_direction  # 自主决策搜索方向
    - search_encyclopedia      # 百科搜索
    - analyze_content          # 内容分析
    - update_shared_state      # 更新共享状态
    - generate_summary         # 生成轮次总结

  # 可用工具
  tools:
    mcp:
      - name: wikipedia_search
        description: Wikipedia API 搜索权威知识
        required: true
      - name: baidu_baike_search
        description: 百度百科 API 搜索中文内容
        required: true
      - name: web_reader
        description: 深入阅读特定网页
        required: false
    services:
      - llm_gateway           # LLM 服务（用于决策和摘要）

  # 决策配置
  decision:
    model: deepseek-chat
    temperature: 0.3
    max_iterations: 5         # 每轮最多 5 次迭代
    timeout: 300s

    # 停止条件
    stopConditions:
      - type: no_new_documents
        value: 2
        description: 连续 2 轮无新文档
      - type: max_iterations
        value: 5
        description: 达到最大轮次
      - type: topics_complete
        description: 核心主题全覆盖且质量达标
        checkPrompt: |
          检查核心主题 (attractions, food, history, transport) 是否全部覆盖且质量 ≥ 70%

  # 记忆配置
  memory:
    type: working
    maxSize: 50
    retention: session
    store:
      - round_summaries        # 轮次总结
      - exploration_log        # 探索日志
      - searched_topics        # 已搜索主题

  # 状态机
  states:
    - idle                    # 空闲
    - thinking                # 思考决策
    - searching               # 搜索中
    - processing              # 处理结果
    - updating                # 更新状态
    - completed               # 完成
    - error                   # 错误

  # 输出格式
  outputFormat:
    type: structured
    schema:
      type: object
      properties:
        total_documents:
          type: integer
          description: 收集的文档总数
        total_rounds:
          type: integer
          description: 执行的轮次数
        round_summaries:
          type: array
          items:
            type: object
            properties:
              round: { type: integer }
              searched_query: { type: string }
              found_documents: { type: integer }
              covered_topics:
                type: array
                items: { type: string }
              quality_score: { type: number }
              summary: { type: string }
        exploration_log:
          type: array
          items:
            type: object
            properties:
              timestamp: { type: string, format: date-time }
              direction: { type: string }
              thought: { type: string }
              action: { type: string }
              tool_name: { type: string }
              result: { type: string }

  # Multi-Agent 配置
  multiAgent:
    sharedState: SharedKnowledgeState
    coordination:
      - read_before_act        # 行动前读取共享状态
      - update_after_act       # 行动后更新共享状态
      - avoid_duplicate_work   # 避免重复工作
    initialTopics:
      - attractions
      - food
      - history
      - transport
    maxResearchers: 4