# Curator Agent Template
# 知识策展人 Agent，负责整理和评估收集的信息
# Multi-Agent 架构中的质量评估节点

kind: AgentTemplate
apiVersion: agent.uta/v1

metadata:
  name: curator
  version: v2.0.0
  description: |
    Curator Agent 是 Multi-Agent 架构中的质量评估节点。
    在所有 Researcher 完成后启动，负责：
    - 评估文档质量
    - 识别重复内容
    - 判断是否需要补充搜索
    - 标注高质量文档

spec:
  # Agent 角色定义
  role: |
    你是一个知识策展人，负责评估 Researcher Agents 收集的信息质量。

    ## 工作时机
    当所有 Researcher Agent 完成后启动。

    ## 主要职责
    1. **质量评估**: 为每篇文档打分 (0-1)
    2. **重复识别**: 找出重复或相似内容
    3. **完整性判断**: 检查主题覆盖是否完整
    4. **补充决策**: 决定是否需要补充搜索

    ## 质量评估标准
    - 准确性: 信息是否具体、可验证
    - 完整性: 是否覆盖主题的关键信息
    - 时效性: 信息是否仍然有效
    - 来源可靠性: 来源是否权威

    ## 迭代机制
    - 最大轮次: 3轮
    - 终止条件: 整体质量 ≥ 0.7 或 连续2轮无改进
    - 可请求 MainAgent 调度补充搜索

  # 能力声明
  capabilities:
    - evaluate_quality         # 质量评估
    - detect_duplicates        # 重复检测
    - check_coverage          # 覆盖检查
    - request_supplement      # 请求补充

  # 可用工具
  tools:
    services:
      - llm_gateway           # LLM 服务（用于质量评估）

  # 决策配置
  decision:
    model: deepseek-chat
    temperature: 0.1
    max_iterations: 3
    timeout: 120s

    # 停止条件
    stopConditions:
      - type: quality_threshold
        value: 0.7
        description: 整体质量达到阈值
      - type: no_improvement
        value: 2
        description: 连续2轮无改进
      - type: max_iterations
        value: 3
        description: 达到最大轮次

  # 状态机
  states:
    - idle                    # 空闲
    - evaluating              # 评估中
    - deduplicating           # 去重中
    - reporting               # 汇报中
    - requesting_supplement   # 请求补充
    - completed               # 完成
    - error                   # 错误

  # 输入来源
  inputSource:
    from: shared_state        # 从共享状态读取
    format: documents

  # 输出格式
  outputFormat:
    type: structured
    schema:
      type: object
      properties:
        quality_score:
          type: number
          description: 整体质量分数 (0-1)
        documents_evaluated:
          type: integer
          description: 评估的文档数
        high_quality_count:
          type: integer
          description: 高质量文档数
        duplicates_found:
          type: integer
          description: 发现的重复数
        needs_more_search:
          type: boolean
          description: 是否需要补充搜索
        missing_aspects:
          type: array
          items:
            type: string
          description: 缺失的方面
        is_complete:
          type: boolean
          description: 是否完成

  # Multi-Agent 配置
  multiAgent:
    sharedState: SharedKnowledgeState
    triggerCondition: all_researchers_complete
    output:
      - quality_scores        # 文档质量分数
      - duplicate_groups      # 重复文档组
      - supplement_requests   # 补充搜索请求